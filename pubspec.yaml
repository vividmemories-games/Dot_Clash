name: dot_clash
description: "The childhood notebook game becomes a battle arena."
publish_to: 'none'
version: 1.2.1+10

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.8.0 # For Firebase initialization
  firebase_auth: ^6.5.0  # For Firebase Authentication
  google_sign_in: ^7.2.0 # For Google Sign-In

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Firebase
  #firebase_core: ^3.6.0
  #firebase_auth: ^5.3.1
  cloud_firestore: ^6.4.0
  cloud_functions: ^6.3.0
  firebase_messaging: ^16.2.1
  firebase_crashlytics: ^5.2.1
  firebase_analytics: ^12.4.0

  # Monetization
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

  # Utilities
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.5
  flutter_svg: ^2.3.0
  firebase_app_check: ^0.4.4+1
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/Designer_3.png
  adaptive_icon_background: '#0E1E35'
  adaptive_icon_foreground: assets/icons/Designer_3.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/campaign/
