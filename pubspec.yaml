name: dot_clash
description: "The childhood notebook game becomes a battle arena."
publish_to: 'none'
version: 1.5.0+24

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  app_links: ^7.0.0
  cloud_firestore: ^6.4.0
  cloud_functions: ^6.3.0
  crypto: ^3.0.5
  cupertino_icons: ^1.0.8
  firebase_analytics: ^12.4.0
  firebase_app_check: ^0.4.4+1
  firebase_auth: ^6.5.0
  firebase_core: ^4.8.0
  firebase_crashlytics: ^5.2.1
  firebase_messaging: ^16.2.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.3.0
  go_router: ^14.2.7
  google_mobile_ads: ^5.1.0
  google_sign_in: ^7.2.0
  in_app_purchase: ^3.2.0
  package_info_plus: ^8.3.0
  shared_preferences: ^2.3.2
  sign_in_with_apple: ^7.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/Designer_3.png
  adaptive_icon_background: '#0E1E35'
  adaptive_icon_foreground: assets/icons/Designer_3.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/campaign/
